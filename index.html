<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Add icon library -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link rel="stylesheet" href="css/style.css">
<style>
.btn {
  background-color: DodgerBlue;
  border: none;
  color: white;
  padding: 12px 30px;
  cursor: pointer;
  font-size: 20px;
}

/* Darker background on mouse-over */
.btn:hover {
  background-color: RoyalBlue;
}
</style>
</head>
<body>

<form method="get" action="spacenebula.jpg">
   <button type="submit">Download!</button>
</form>  
  
<h2>Style Download Buttons</h2>

<p>Auto width:</p>
<form method="get" action="spacenebula.jpg">
<button class="btn" type="submit"><i class="fa fa-download"></i> Download</button>
</form>  
  
<p>Full width:</p>
<form method="get" action="spacenebula.jpg">
<button class="btn" type="submit" style="width:25%"><i class="fa fa-download"></i> Download</button>
</form> 
  
</body>
</html>
